<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Machine</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1E3A5F; --accent: #2E86AB; --light: #EAF4FB;
    --green: #1A7A4A; --red: #C0392B; --gray: #666;
    --radius: 10px; --shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #222; min-height: 100vh; }

  /* ── Layout ── */
  .app { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  .hidden { display: none !important; }

  /* ── Nav ── */
  nav { background: var(--brand); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  nav h1 { font-size: 1.2rem; letter-spacing: .5px; }
  nav button { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: .85rem; }

  /* ── Card ── */
  .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; margin-bottom: 20px; }
  .card h2 { color: var(--brand); margin-bottom: 20px; font-size: 1.4rem; }

  /* ── Form ── */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: .85rem; color: var(--gray); margin-bottom: 6px; font-weight: 600; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 1rem; outline: none; transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  .error-msg { color: var(--red); font-size: .83rem; margin-top: 6px; }

  /* ── Buttons ── */
  .btn { display: inline-block; padding: 11px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .2s; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-secondary { background: var(--light); color: var(--brand); border: 1.5px solid var(--accent); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-sm { padding: 7px 16px; font-size: .85rem; }
  .link-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: .9rem; text-decoration: underline; }

  /* ── Search ── */
  .search-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .search-row input { flex: 1; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip { background: var(--light); border: 1px solid var(--accent); color: var(--brand); padding: 4px 12px; border-radius: 20px; font-size: .8rem; cursor: pointer; }

  /* ── Suggestion cards ── */
  .suggestions { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .sug-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; cursor: pointer; border: 2px solid transparent; transition: border-color .2s, transform .15s; }
  .sug-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .sug-card .domain { font-size: .75rem; color: var(--gray); margin-bottom: 6px; }
  .sug-card h3 { font-size: .95rem; color: var(--brand); margin-bottom: 8px; line-height: 1.3; }
  .sug-card .teaser { font-size: .83rem; color: #555; line-height: 1.5; }
  .sug-card .meta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .score-badge { font-size: .75rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--light); color: var(--accent); }

  /* ── Skeleton loader ── */
  .skeleton { background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 6px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .sk-block { height: 14px; margin-bottom: 10px; }
  .sk-title { height: 18px; width: 80%; }
  .sk-text  { height: 12px; width: 95%; }

  /* ── Reader ── */
  .reader-header { border-bottom: 2px solid var(--light); padding-bottom: 16px; margin-bottom: 20px; }
  .reader-header h2 { font-size: 1.4rem; color: var(--brand); line-height: 1.35; }
  .reader-meta { font-size: .82rem; color: var(--gray); margin-top: 8px; }
  .reader-body { line-height: 1.75; color: #333; white-space: pre-wrap; font-size: .97rem; }
  .share-bar { display: flex; gap: 10px; margin-top: 28px; padding-top: 18px; border-top: 2px solid var(--light); }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: var(--radius); padding: 32px; width: min(480px, 94vw); box-shadow: 0 12px 48px rgba(0,0,0,.18); }
  .modal h3 { color: var(--brand); margin-bottom: 18px; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 13px 26px; border-radius: 8px; font-size: .95rem; font-weight: 600; box-shadow: var(--shadow); z-index: 200; animation: slideUp .3s ease; }
  .toast.error { background: var(--red); }
  @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(16px); } }

  /* ── Verification receipt ── */
  .receipt { background: #e8f8ef; border: 2px solid var(--green); border-radius: var(--radius); padding: 20px; text-align: center; }
  .receipt .check { font-size: 2.5rem; margin-bottom: 8px; }
  .receipt h3 { color: var(--green); }
  .receipt .msg-id { font-size: .78rem; color: var(--gray); margin-top: 8px; font-family: monospace; }

  /* ── Auth toggle ── */
  .auth-toggle { text-align: center; margin-top: 18px; color: var(--gray); font-size: .88rem; }
</style>
</head>
<body>

<nav>
  <h1>📰 Post Machine</h1>
  <span id="nav-user" class="hidden">
    <span id="nav-name" style="font-size:.85rem;margin-right:12px;opacity:.8"></span>
    <button onclick="logout()">Log out</button>
  </span>
</nav>

<div class="app">

  <!-- ── AUTH VIEW ─────────────────────────────────────────── -->
  <div id="view-auth" class="card" style="max-width:420px;margin:48px auto;">
    <h2 id="auth-title">Sign in to Post Machine</h2>
    <div id="auth-error" class="error-msg hidden"></div>

    <div id="register-only" class="hidden">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="inp-name" placeholder="Your name" maxlength="60">
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="you@example.com" maxlength="254">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="inp-password" placeholder="••••••••" maxlength="128">
    </div>
    <button class="btn btn-primary" id="auth-btn" onclick="submitAuth()">Sign In</button>
    <div class="auth-toggle">
      <button class="link-btn" onclick="toggleAuthMode()">
        <span id="auth-toggle-text">Don't have an account? Register</span>
      </button>
    </div>
  </div>

  <!-- ── SEARCH VIEW ───────────────────────────────────────── -->
  <div id="view-search" class="hidden">
    <div class="card">
      <h2>What are you curious about today?</h2>
      <div class="search-row">
        <input type="text" id="inp-topic" placeholder="e.g. quantum computing, climate tech…" maxlength="200"
          onkeydown="if(event.key==='Enter') startSearch()">
        <button class="btn btn-primary" id="search-btn" onclick="startSearch()" style="width:auto;padding:10px 24px">Search</button>
      </div>
      <div class="chips" id="recent-chips"></div>
    </div>

    <div id="search-results" class="hidden">
      <div id="result-skeletons" class="suggestions hidden">
        ${[1,2,3].map(()=>`
        <div class="sug-card" style="pointer-events:none">
          <div class="skeleton sk-block" style="width:50%;height:10px;margin-bottom:8px"></div>
          <div class="skeleton sk-title"></div>
          <div style="height:8px"></div>
          <div class="skeleton sk-text"></div>
          <div class="skeleton sk-text" style="width:80%;margin-top:4px"></div>
        </div>`).join('')}
      </div>
      <div id="result-cards" class="suggestions"></div>
      <div id="result-empty" class="card hidden" style="text-align:center;padding:40px">
        <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
        <h3 style="color:var(--brand);margin-bottom:8px">No results found</h3>
        <p style="color:var(--gray)" id="empty-hint">Try different keywords or a broader topic.</p>
      </div>
    </div>
  </div>

  <!-- ── READER VIEW ───────────────────────────────────────── -->
  <div id="view-reader" class="hidden">
    <button class="btn btn-secondary btn-sm" onclick="backToSearch()" style="margin-bottom:16px">← Back</button>
    <div class="card">
      <div class="reader-header">
        <h2 id="reader-title"></h2>
        <div class="reader-meta">
          <span id="reader-domain"></span> · <span id="reader-time"></span> min read
        </div>
      </div>
      <div class="reader-body" id="reader-body"></div>
      <div class="share-bar">
        <button class="btn btn-primary btn-sm" onclick="openShare('email')">✉ Share via Email</button>
        <button class="btn btn-secondary btn-sm" onclick="openShare('telegram')">✈ Send to Telegram</button>
        <button class="btn btn-secondary btn-sm" onclick="copyLink()">🔗 Copy Link</button>
      </div>
    </div>
  </div>

  <!-- ── RECEIPT VIEW ──────────────────────────────────────── -->
  <div id="view-receipt" class="hidden">
    <button class="btn btn-secondary btn-sm" onclick="backToSearch()" style="margin-bottom:16px">← New Search</button>
    <div class="card">
      <div class="receipt">
        <div class="check">✅</div>
        <h3>Sent Successfully!</h3>
        <p id="receipt-msg" style="color:#555;margin-top:8px"></p>
        <div class="msg-id" id="receipt-id"></div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ── SHARE MODAL ────────────────────────────────────────── -->
<div id="share-modal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-title">Share Article</h3>
    <div id="modal-error" class="error-msg hidden"></div>
    <div class="form-group">
      <label id="modal-label">Email address</label>
      <input type="text" id="modal-input" placeholder="">
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitShare()" id="modal-send-btn">Send</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<script>
// ── Config ─────────────────────────────────────────────────────
const API = '';  // Vercel API routes are at /api/*

// ── State ──────────────────────────────────────────────────────
let state = {
  user:        null,
  isRegister:  false,
  currentArticle: null,
  shareChannel:   null,
};

// ── Utils ──────────────────────────────────────────────────────
function show(id)  { document.getElementById(id).classList.remove('hidden'); }
function hide(id)  { document.getElementById(id).classList.add('hidden'); }
function el(id)    { return document.getElementById(id); }
function setError(id, msg) { const e=el(id); e.textContent=msg; e.classList.toggle('hidden',!msg); }

function toast(msg, isError=false) {
  const t = el('toast');
  t.textContent = msg; t.className = `toast${isError?' error':''}`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 4500);
}

function showView(name) {
  ['auth','search','reader','receipt'].forEach(v => hide(`view-${v}`));
  show(`view-${name}`);
}

// ── Auth ───────────────────────────────────────────────────────
function toggleAuthMode() {
  state.isRegister = !state.isRegister;
  el('auth-title').textContent   = state.isRegister ? 'Create Account' : 'Sign in to Post Machine';
  el('auth-btn').textContent     = state.isRegister ? 'Create Account' : 'Sign In';
  el('auth-toggle-text').textContent = state.isRegister ? 'Already have an account? Sign in' : "Don't have an account? Register";
  el('register-only').classList.toggle('hidden', !state.isRegister);
  setError('auth-error','');
}

async function submitAuth() {
  const email    = el('inp-email').value.trim();
  const password = el('inp-password').value;
  const name     = el('inp-name').value.trim();
  setError('auth-error','');

  if (!email || !password) { setError('auth-error','Email and password are required'); return; }
  if (state.isRegister && !name) { setError('auth-error','Display name is required'); return; }

  el('auth-btn').disabled = true;
  try {
    const endpoint = state.isRegister ? '/auth/register' : '/auth/login';
    const body     = state.isRegister
      ? { email, password, displayName: name }
      : { email, password };

    const r = await api('POST', endpoint, body);
    state.user = r.user;
    el('nav-name').textContent = r.user.displayName || r.user.email;
    show('nav-user');
    loadRecentTopics();
    showView('search');
  } catch(e) {
    setError('auth-error', e.message);
  } finally {
    el('auth-btn').disabled = false;
  }
}

async function logout() {
  await api('POST','/auth/logout',{}).catch(()=>{});
  state.user = null;
  hide('nav-user');
  showView('auth');
}

// ── Search ─────────────────────────────────────────────────────
function loadRecentTopics() {
  const recent = JSON.parse(localStorage.getItem('pm_recent') || '[]');
  const chips  = el('recent-chips');
  chips.innerHTML = recent.slice(0,5).map(t =>
    `<span class="chip" onclick="searchTopic('${t.replace(/'/g,"\\'")}'">${t}</span>`
  ).join('');
}

function saveRecentTopic(topic) {
  let recent = JSON.parse(localStorage.getItem('pm_recent') || '[]');
  recent = [topic, ...recent.filter(t => t !== topic)].slice(0, 5);
  localStorage.setItem('pm_recent', JSON.stringify(recent));
  loadRecentTopics();
}

function searchTopic(topic) { el('inp-topic').value = topic; startSearch(); }

async function startSearch() {
  const topic = el('inp-topic').value.trim();
  if (!topic) return;

  el('search-btn').disabled = true;
  show('search-results');
  hide('result-cards');
  hide('result-empty');
  show('result-skeletons');

  try {
    const results = await api('POST','/discover',{ topic });
    hide('result-skeletons');

    if (!results || results.length === 0) {
      show('result-empty');
      return;
    }

    saveRecentTopic(topic);
    const container = el('result-cards');
    container.innerHTML = results.map(s => `
      <div class="sug-card" onclick="openArticle(${JSON.stringify(JSON.stringify(s)).slice(1,-1)})">
        <div class="domain">${s.domain}</div>
        <h3>${escHtml(s.title)}</h3>
        <div class="teaser">${escHtml(s.teaser ?? '')}</div>
        <div class="meta-row">
          <span style="font-size:.75rem;color:var(--gray)">${s.readingTime ?? '?'} min</span>
          <span class="score-badge">★ ${Math.round((s.score??0)*100)}%</span>
        </div>
      </div>`).join('');
    show('result-cards');
  } catch(e) {
    hide('result-skeletons');
    if (e.code === 'NO_RESULTS') {
      show('result-empty');
      el('empty-hint').textContent = e.suggestions?.join(' · ') ?? 'Try different keywords.';
    } else {
      toast(e.message || 'Search failed, please try again', true);
    }
  } finally {
    el('search-btn').disabled = false;
  }
}

// ── Article reader ─────────────────────────────────────────────
async function openArticle(jsonStr) {
  const suggestion = JSON.parse(jsonStr);
  showView('reader');
  el('reader-title').textContent  = suggestion.title;
  el('reader-domain').textContent = suggestion.domain;
  el('reader-time').textContent   = suggestion.readingTime ?? '?';
  el('reader-body').textContent   = 'Loading…';
  state.currentArticle = suggestion;

  try {
    const article = await api('POST','/article',{ url: suggestion.url });
    state.currentArticle = { ...suggestion, ...article };
    el('reader-body').textContent = article.body;
  } catch(e) {
    el('reader-body').textContent = suggestion.teaser ?? 'Could not load article content.';
    toast('Full content unavailable — showing preview', true);
  }
}

function backToSearch() { showView('search'); }

// ── Share ──────────────────────────────────────────────────────
function openShare(channel) {
  state.shareChannel = channel;
  const isEmail = channel === 'email';
  el('modal-title').textContent = isEmail ? '✉ Share via Email' : '✈ Send to Telegram';
  el('modal-label').textContent = isEmail ? 'Recipient email address' : 'Telegram @username or chat ID';
  el('modal-input').placeholder = isEmail ? 'friend@example.com' : '@username or -100123456';
  el('modal-input').value = '';
  setError('modal-error','');
  show('share-modal');
  setTimeout(() => el('modal-input').focus(), 50);
}

function closeModal() { hide('share-modal'); }

async function submitShare() {
  const recipient = el('modal-input').value.trim();
  if (!recipient) { setError('modal-error', 'Please enter a recipient'); return; }

  const btn = el('modal-send-btn');
  btn.disabled = true;
  setError('modal-error','');

  const article = {
    title:  state.currentArticle?.title,
    url:    state.currentArticle?.url,
    teaser: state.currentArticle?.teaser,
  };

  try {
    let result;
    if (state.shareChannel === 'email') {
      result = await api('POST','/share/email', { to: recipient, article });
    } else {
      result = await api('POST','/share/telegram', { chatId: recipient, article });
    }

    closeModal();
    el('receipt-msg').textContent = result.message ?? 'Article delivered successfully!';
    el('receipt-id').textContent = result.messageId ? `Message ID: ${result.messageId}` : '';
    showView('receipt');
  } catch(e) {
    setError('modal-error', e.message || 'Delivery failed, please retry');
  } finally {
    btn.disabled = false;
  }
}

function copyLink() {
  navigator.clipboard.writeText(state.currentArticle?.url ?? location.href)
    .then(() => toast('Link copied!'))
    .catch(() => toast('Could not copy link', true));
}

// ── API helper ─────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}${path}`, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) {
    const err = new Error(data.error || `Request failed (${r.status})`);
    err.code  = data.code;
    err.suggestions = data.suggestions;
    throw err;
  }
  return data;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ───────────────────────────────────────────────────────
(async () => {
  try {
    const r = await api('GET','/auth/me',null);
    state.user = r.user;
    el('nav-name').textContent = r.user.displayName || r.user.email;
    show('nav-user');
    loadRecentTopics();
    showView('search');
  } catch {
    showView('auth');
  }
})();
</script>
</body>
</html>
